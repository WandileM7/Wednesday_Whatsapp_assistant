# ============================================
# Wednesday WhatsApp Assistant - GCP Deployment
# ============================================
# Deploys the JARVIS-powered assistant to Google Cloud Run
#
# Prerequisites:
# 1. Create a GCP project
# 2. Enable Cloud Run, Artifact Registry, Secret Manager APIs
# 3. Create a service account with these roles:
#    - Cloud Run Admin
#    - Artifact Registry Writer
#    - Service Account User
#    - Secret Manager Secret Accessor
#    - Vertex AI User (for Gemini)
# 4. Add these GitHub secrets:
#    - GCP_PROJECT_ID: Your GCP project ID
#    - GCP_SA_KEY: Service account JSON key (base64 encoded)
#    - GCP_REGION: e.g., us-central1
#
# Required secrets for JARVIS:
#    - GEMINI_API_KEY: Required for MCP Agent reasoning
#
# Optional secrets (JARVIS features):
#    - ELEVENLABS_API_KEY: Premium voice synthesis
#    - IFTTT_WEBHOOK_KEY: Smart home automation
#    - HOME_ASSISTANT_URL, HOME_ASSISTANT_TOKEN: Local smart home
#    - SPOTIFY_CLIENT_ID, SPOTIFY_SECRET: Music control

name: Deploy JARVIS to Google Cloud Run

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.github/copilot-instructions.md'
      - 'whatsapp-service/**'  # Separate workflow for WhatsApp service
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: wednesday-assistant
  MCP_SERVICE_NAME: wednesday-mcp
  ARTIFACT_REGISTRY: wednesday-registry
  IMAGE_NAME: assistant
  MCP_IMAGE_NAME: mcp-server

jobs:
  # ============================================
  # JOB 1: Build and Test
  # ============================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run linting (optional)
        continue-on-error: true
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test imports
        run: |
          python -c "from handlers.mcp_agent import chat_with_functions, get_mcp_agent_status; print('✅ MCP Agent OK')"
          python -c "from mcp_server.server import TOOLS; print(f'✅ MCP Tools: {len(TOOLS)}')"
          python -c "from handlers.speech import speech_to_text; print('✅ Speech handler OK')"
          python -c "from handlers.workflows import workflow_engine; print('✅ Workflows OK')"
          python -c "from handlers.long_term_memory import long_term_memory; print('✅ Long-term Memory OK')"
          python -c "import main; print('✅ Main app OK')"

  # ============================================
  # JOB 2: Build Docker Image
  # ============================================
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry (if not exists)
        continue-on-error: true
        run: |
          gcloud artifacts repositories create ${{ env.ARTIFACT_REGISTRY }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Wednesday Assistant Docker images" \
            --quiet || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cloudrun
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Build and push MCP Docker image
        id: build-mcp
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.mcp
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.MCP_IMAGE_NAME }}:${{ github.sha }},${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.MCP_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # JOB 3: Deploy to Cloud Run
  # ============================================
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      mcp_url: ${{ steps.deploy-mcp.outputs.url }}
      waha_url: ${{ steps.get-whatsapp-url.outputs.waha_url }}
    
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Enable Vertex AI API and grant runtime SA access
        continue-on-error: true
        run: |
          # Enable Vertex AI (idempotent — safe to run every deploy)
          gcloud services enable aiplatform.googleapis.com --project=${{ env.PROJECT_ID }} --quiet

          # Grant the Cloud Run runtime service account permission to call Vertex AI Gemini.
          # Cloud Run instances run as the Compute Engine default SA unless overridden.
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')
          CR_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"

          gcloud projects add-iam-policy-binding ${{ env.PROJECT_ID }} \
            --member="serviceAccount:${CR_SA}" \
            --role="roles/aiplatform.user" \
            --condition=None \
            --quiet || true

      - name: Create/Update Secrets in Secret Manager
        run: |
          # Function to create or update a secret
          create_or_update_secret() {
            local secret_name=$1
            local secret_value=$2
            
            if [ -n "$secret_value" ]; then
              # Check if secret exists
              if gcloud secrets describe $secret_name --project=${{ env.PROJECT_ID }} >/dev/null 2>&1; then
                echo "Updating secret: $secret_name"
                echo -n "$secret_value" | gcloud secrets versions add $secret_name --data-file=- --project=${{ env.PROJECT_ID }}
              else
                echo "Creating secret: $secret_name"
                echo -n "$secret_value" | gcloud secrets create $secret_name --data-file=- --project=${{ env.PROJECT_ID }}
              fi
            fi
          }
          
          # Core AI secrets
          create_or_update_secret "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}"
          create_or_update_secret "BYTEZ_API_KEY" "${{ secrets.BYTEZ_API_KEY }}"
          
          # Spotify secrets
          create_or_update_secret "SPOTIFY_CLIENT_ID" "${{ secrets.SPOTIFY_CLIENT_ID }}"
          create_or_update_secret "SPOTIFY_SECRET" "${{ secrets.SPOTIFY_SECRET }}"
          create_or_update_secret "SPOTIFY_REFRESH_TOKEN" "${{ secrets.SPOTIFY_REFRESH_TOKEN }}"
          
          # Google OAuth secrets
          create_or_update_secret "GOOGLE_CLIENT_ID" "${{ secrets.GOOGLE_CLIENT_ID }}"
          create_or_update_secret "GOOGLE_CLIENT_SECRET" "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          create_or_update_secret "GOOGLE_REFRESH_TOKEN" "${{ secrets.GOOGLE_REFRESH_TOKEN }}"
          
          # External API secrets
          create_or_update_secret "NEWS_API_KEY" "${{ secrets.NEWS_API_KEY }}"
          create_or_update_secret "WEATHERAPI_KEY" "${{ secrets.WEATHERAPI_KEY }}"
          create_or_update_secret "FLASK_SECRET_KEY" "${{ secrets.FLASK_SECRET_KEY }}"
          
          # JARVIS Advanced Features
          create_or_update_secret "ELEVENLABS_API_KEY" "${{ secrets.ELEVENLABS_API_KEY }}"
          create_or_update_secret "IFTTT_WEBHOOK_KEY" "${{ secrets.IFTTT_WEBHOOK_KEY }}"
          create_or_update_secret "HOME_ASSISTANT_URL" "${{ secrets.HOME_ASSISTANT_URL }}"
          create_or_update_secret "HOME_ASSISTANT_TOKEN" "${{ secrets.HOME_ASSISTANT_TOKEN }}"
          
          # Security & Owner Configuration
          create_or_update_secret "OWNER_PHONE" "${{ secrets.OWNER_PHONE }}"
          create_or_update_secret "WHITELISTED_PHONES" "${{ secrets.WHITELISTED_PHONES }}"

      - name: Get WhatsApp Service URL
        id: get-whatsapp-url
        run: |
          # Look up the existing WhatsApp service URL so WAHA_URL is preserved on every deploy,
          # even when whatsapp-service files haven't changed.
          WHATSAPP_URL=$(gcloud run services describe wednesday-whatsapp \
            --region=${{ env.REGION }} \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [ -n "$WHATSAPP_URL" ]; then
            echo "waha_url=${WHATSAPP_URL}/api/sendText" >> $GITHUB_OUTPUT
            echo "✅ WhatsApp service found: $WHATSAPP_URL"
          else
            echo "waha_url=" >> $GITHUB_OUTPUT
            echo "⚠️ WhatsApp service not deployed yet"
            echo ""
            echo "📋 First-time deployment order:"
            echo "   1. This workflow deploys assistant + MCP server"
            echo "   2. Run deploy-whatsapp-gcp.yml workflow manually"
            echo "   3. Scan QR code at <whatsapp-url>/qr"
            echo "   4. WhatsApp service will update assistant with WAHA_URL"
          fi
          
      - name: Get MCP Service URL (if exists)
        id: get-mcp-url
        run: |
          # Look up existing MCP server URL for reference
          MCP_URL=$(gcloud run services describe wednesday-mcp \
            --region=${{ env.REGION }} \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [ -n "$MCP_URL" ]; then
            echo "mcp_url=${MCP_URL}" >> $GITHUB_OUTPUT
            echo "✅ MCP service found: $MCP_URL"
          else
            echo "mcp_url=" >> $GITHUB_OUTPUT
            echo "MCP service will be deployed in this run"
          fi

      - name: Build secrets list
        id: build-secrets
        run: |
          # Build secrets list dynamically based on what exists in Secret Manager
          SECRETS_LIST=""
          
          check_and_add_secret() {
            local secret_name=$1
            if gcloud secrets describe $secret_name --project=${{ env.PROJECT_ID }} >/dev/null 2>&1; then
              if [ -n "$SECRETS_LIST" ]; then
                SECRETS_LIST="${SECRETS_LIST},"
              fi
              SECRETS_LIST="${SECRETS_LIST}${secret_name}=${secret_name}:latest"
              echo "  ✅ $secret_name"
            else
              echo "  ⏭️ $secret_name (not configured)"
            fi
          }
          
          echo "Checking available secrets..."
          
          # Required secrets
          check_and_add_secret "GEMINI_API_KEY"
          check_and_add_secret "FLASK_SECRET_KEY"
          
          # Optional AI/API secrets
          check_and_add_secret "BYTEZ_API_KEY"
          check_and_add_secret "NEWS_API_KEY"
          check_and_add_secret "WEATHERAPI_KEY"
          
          # Spotify secrets
          check_and_add_secret "SPOTIFY_CLIENT_ID"
          check_and_add_secret "SPOTIFY_SECRET"
          check_and_add_secret "SPOTIFY_REFRESH_TOKEN"
          
          # Google OAuth secrets
          check_and_add_secret "GOOGLE_CLIENT_ID"
          check_and_add_secret "GOOGLE_CLIENT_SECRET"
          check_and_add_secret "GOOGLE_REFRESH_TOKEN"
          
          # JARVIS Advanced Features (all optional)
          check_and_add_secret "ELEVENLABS_API_KEY"
          check_and_add_secret "IFTTT_WEBHOOK_KEY"
          check_and_add_secret "HOME_ASSISTANT_URL"
          check_and_add_secret "HOME_ASSISTANT_TOKEN"
          
          # Security
          check_and_add_secret "OWNER_PHONE"
          check_and_add_secret "WHITELISTED_PHONES"
          
          echo ""
          echo "secrets_list=$SECRETS_LIST" >> $GITHUB_OUTPUT
          echo "Secrets to mount: $(echo $SECRETS_LIST | tr ',' '\n' | wc -l) secrets"

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          # Deploy with dynamically built secrets list
          SECRETS_FLAG=""
          if [ -n "${{ steps.build-secrets.outputs.secrets_list }}" ]; then
            SECRETS_FLAG="--set-secrets=${{ steps.build-secrets.outputs.secrets_list }}"
          fi
          
          # Use ^ as delimiter to avoid issues with commas in values
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --concurrency=80 \
            --timeout=300 \
            --port=5000 \
            --set-env-vars="^@^FLASK_DEBUG=false@USE_MEMORY_DB=false@PYTHONUNBUFFERED=1@GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}@GOOGLE_CLOUD_LOCATION=${{ env.REGION }}@MCP_AGENT_MODEL=gemini-2.5-flash@WAHA_URL=${{ steps.get-whatsapp-url.outputs.waha_url }}@SPOTIFY_REDIRECT_URI=${{ secrets.SPOTIFY_REDIRECT_URI }}@PERSONALITY_PROMPT=You are JARVIS, an advanced AI assistant with dry British wit, efficiency, and anticipatory intelligence." \
            $SECRETS_FLAG
          
          # Get the service URL
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "🚀 Deployed to: $SERVICE_URL"

      - name: Health Check
        run: |
          echo "🏥 Running health check..."
          SERVICE_URL="${{ steps.deploy.outputs.url }}"
          
          for i in {1..5}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              curl -s "$SERVICE_URL/health" | jq . || true
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS - Waiting..."
            sleep 10
          done
          
          echo "⚠️ Health check didn't pass, but deployment completed"

      - name: Deploy MCP Server to Cloud Run
        id: deploy-mcp
        run: |
          # Deploy MCP server with same secrets list (reuse from previous step)
          SECRETS_FLAG=""
          if [ -n "${{ steps.build-secrets.outputs.secrets_list }}" ]; then
            SECRETS_FLAG="--set-secrets=${{ steps.build-secrets.outputs.secrets_list }}"
          fi
          
          gcloud run deploy ${{ env.MCP_SERVICE_NAME }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.MCP_IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5 \
            --concurrency=100 \
            --timeout=60 \
            --port=8080 \
            --set-env-vars="MCP_PORT=8080,PYTHONUNBUFFERED=1,WAHA_URL=${{ steps.get-whatsapp-url.outputs.waha_url }},ASSISTANT_URL=${{ steps.deploy.outputs.url }}" \
            $SECRETS_FLAG
          
          # Get the service URL
          MCP_URL=$(gcloud run services describe ${{ env.MCP_SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$MCP_URL" >> $GITHUB_OUTPUT
          echo "🤖 MCP Server deployed to: $MCP_URL"

      - name: Show MCP deployment URL
        run: |
          echo "🤖 MCP Server deployed to: ${{ steps.deploy-mcp.outputs.url }}"
          echo ""
          echo "📋 MCP Endpoints:"
          echo "  - Tools: ${{ steps.deploy-mcp.outputs.url }}/tools"
          echo "  - Health: ${{ steps.deploy-mcp.outputs.url }}/health"
          echo "  - Status: ${{ steps.deploy-mcp.outputs.url }}/status"

  # ============================================
  # JOB 4: Update WhatsApp Webhook
  # ============================================
  configure-webhook:
    name: Configure Webhook
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    
    steps:
      - name: Update WAHA webhook URL
        run: |
          SERVICE_URL="${{ needs.deploy.outputs.url || '' }}"
          
          if [ -n "$SERVICE_URL" ] && [ -n "${{ secrets.WAHA_URL }}" ]; then
            echo "📱 Configuring WhatsApp webhook to: $SERVICE_URL/webhook"
            # This would need to be customized based on your WAHA setup
            # curl -X POST "${{ secrets.WAHA_URL }}/api/sessions/default/config" \
            #   -H "Content-Type: application/json" \
            #   -d "{\"webhook\": \"$SERVICE_URL/webhook\"}"
          else
            echo "ℹ️ Skipping webhook configuration"
          fi

  # ============================================
  # JOB 5: Notify on completion
  # ============================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy, configure-webhook]
    if: always()
    
    steps:
      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "� JARVIS Deployment Summary"
          echo "============================================"
          echo ""
          echo "📦 Services Deployed:"
          echo "  • Assistant: ${{ needs.deploy.outputs.url || 'N/A' }}"
          echo "  • MCP Server: ${{ needs.deploy.outputs.mcp_url || 'N/A' }}"
          echo ""
          echo "📊 Status:"
          echo "  • Deploy: ${{ needs.deploy.result }}"
          echo "  • Webhook: ${{ needs.configure-webhook.result }}"
          echo ""
          echo "📝 Details:"
          echo "  • Region: ${{ env.REGION }}"
          echo "  • Commit: ${{ github.sha }}"
          echo "  • Branch: ${{ github.ref_name }}"
          echo "  • Actor: ${{ github.actor }}"
          echo ""
          echo "============================================"
          echo "🔗 Architecture Flow:"
          echo "============================================"
          echo ""
          echo "  WhatsApp Service (port 3000)"
          echo "       │"
          echo "       │ webhook POST /webhook"
          echo "       ▼"
          echo "  Main Assistant (port 5000) ◄─── Dashboard /quick-setup"
          echo "       │"
          echo "       │ MCP Agent (direct import, same process)"
          echo "       ▼"
          echo "  MCP Tools (56 tools)"
          echo "       │"
          echo "       ├─► Gemini AI (reasoning)"
          echo "       ├─► Spotify, Gmail, Calendar"
          echo "       ├─► Smart Home, ElevenLabs Voice"
          echo "       └─► Owner Admin Commands"
          echo ""
          echo "  MCP HTTP Server (port 8080) ◄─── External MCP Clients"
          echo ""
          echo "============================================"
          echo ""
          if [ -z "${{ needs.deploy.outputs.waha_url }}" ]; then
            echo "⚠️  FIRST-TIME DEPLOYMENT DETECTED"
            echo ""
            echo "Next steps:"
            echo "  1. Run 'Deploy WhatsApp Service to GCP' workflow manually"
            echo "  2. Visit <whatsapp-url>/qr to scan QR code"
            echo "  3. WhatsApp service will auto-update assistant with WAHA_URL"
            echo ""
          fi
          echo "============================================"
