# ============================================
# WhatsApp Service (Baileys) - GCP Deployment
# ============================================
# Deploys the WhatsApp gateway service to Google Cloud Run
#
# This runs separately from the main assistant and handles:
# - WhatsApp WebSocket connection
# - QR code generation for authentication
# - Message forwarding to the assistant webhook

name: Deploy WhatsApp Service to GCP

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'whatsapp-service/**'
      - '.github/workflows/deploy-whatsapp-gcp.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: wednesday-whatsapp
  ARTIFACT_REGISTRY: wednesday-registry
  IMAGE_NAME: whatsapp-service

jobs:
  # ============================================
  # Build and Deploy WhatsApp Service
  # ============================================
  deploy-whatsapp:
    name: Deploy WhatsApp Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./whatsapp-service
          file: ./whatsapp-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get Assistant Service URL
        id: get-assistant-url
        run: |
          ASSISTANT_URL=$(gcloud run services describe wednesday-assistant \
            --region=${{ env.REGION }} \
            --format='value(status.url)' 2>/dev/null || echo "")

          if [ -z "$ASSISTANT_URL" ]; then
            echo "Assistant service not found yet, using placeholder"
            ASSISTANT_URL="https://wednesday-assistant-PLACEHOLDER.run.app"
          fi

          echo "assistant_url=$ASSISTANT_URL" >> $GITHUB_OUTPUT
          echo "Assistant URL: $ASSISTANT_URL"

      - name: Set up GCS session bucket
        id: setup-bucket
        run: |
          set +e  # Disable exit on error for this script
          
          # Bucket name must be globally unique — use project ID as prefix
          BUCKET_NAME="${{ env.PROJECT_ID }}-whatsapp-session"
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT

          # Check if bucket exists
          gcloud storage buckets describe gs://${BUCKET_NAME} >/dev/null 2>&1
          BUCKET_EXISTS=$?
          
          if [ $BUCKET_EXISTS -eq 0 ]; then
            echo "✅ Bucket already exists: gs://${BUCKET_NAME}"
            echo "bucket_exists=true" >> $GITHUB_OUTPUT
          else
            # Try to create bucket
            echo "Attempting to create bucket: gs://${BUCKET_NAME}"
            gcloud storage buckets create gs://${BUCKET_NAME} \
              --location=${{ env.REGION }} \
              --uniform-bucket-level-access 2>&1
            CREATE_RESULT=$?
            
            if [ $CREATE_RESULT -eq 0 ]; then
              echo "✅ Created bucket: gs://${BUCKET_NAME}"
              echo "bucket_exists=true" >> $GITHUB_OUTPUT
            else
              echo ""
              echo "⚠️ Could not create bucket (missing storage.buckets.create permission)"
              echo "⚠️ WhatsApp session will NOT persist across restarts"
              echo ""
              echo "To fix, either:"
              echo "  1. Add 'Storage Admin' role to wednesday-deployer service account"
              echo "  2. Manually create bucket in Cloud Shell:"
              echo "     gcloud storage buckets create gs://${BUCKET_NAME} --location=${{ env.REGION }}"
              echo ""
              echo "bucket_exists=false" >> $GITHUB_OUTPUT
              exit 0  # Continue workflow without bucket
            fi
          fi

          # Grant objectAdmin so Cloud Run can read and write session files
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)' 2>/dev/null || echo "")
          if [ -n "$PROJECT_NUMBER" ]; then
            CR_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
            gcloud storage buckets add-iam-policy-binding gs://${BUCKET_NAME} \
              --member="serviceAccount:${CR_SA}" \
              --role="roles/storage.objectAdmin" \
              --quiet 2>/dev/null || true
            echo "Bucket ready: gs://${BUCKET_NAME}"
          fi

      - name: Deploy to Cloud Run (with persistent session)
        id: deploy
        if: steps.setup-bucket.outputs.bucket_exists == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            ENABLE_REAL_WHATSAPP=true
            SHOW_QR=true
            LOG_LEVEL=info
            WHATSAPP_HOOK_URL=${{ steps.get-assistant-url.outputs.assistant_url }}/webhook
            WHATSAPP_HOOK_EVENTS=message
            MAX_RECONNECT_ATTEMPTS=10
            SESSION_PATH=/app/session
          flags: |
            --platform=managed
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=1
            --max-instances=1
            --concurrency=100
            --timeout=3600
            --port=3000
            --execution-environment=gen2
            --add-volume=name=whatsapp-session,type=cloud-storage,bucket=${{ steps.setup-bucket.outputs.bucket_name }},mount-options=allow_other:uid=1001:gid=1001
            --add-volume-mount=volume=whatsapp-session,mount-path=/app/session

      - name: Deploy to Cloud Run (without persistent session)
        id: deploy-no-storage
        if: steps.setup-bucket.outputs.bucket_exists != 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            ENABLE_REAL_WHATSAPP=true
            SHOW_QR=true
            LOG_LEVEL=info
            WHATSAPP_HOOK_URL=${{ steps.get-assistant-url.outputs.assistant_url }}/webhook
            WHATSAPP_HOOK_EVENTS=message
            MAX_RECONNECT_ATTEMPTS=10
          flags: |
            --platform=managed
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=1
            --max-instances=1
            --concurrency=100
            --timeout=3600
            --port=3000
            --execution-environment=gen2

      - name: Set deployment URL
        id: set-url
        run: |
          if [ -n "${{ steps.deploy.outputs.url }}" ]; then
            echo "url=${{ steps.deploy.outputs.url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ steps.deploy-no-storage.outputs.url }}" >> $GITHUB_OUTPUT
          fi

      - name: Show deployment info
        run: |
          echo "============================================"
          echo "📱 WhatsApp Service Deployed!"
          echo "============================================"
          URL="${{ steps.set-url.outputs.url }}"
          echo "Service URL: $URL"
          echo "Webhook Target: ${{ steps.get-assistant-url.outputs.assistant_url }}/webhook"
          echo ""
          if [ "${{ steps.setup-bucket.outputs.bucket_exists }}" != "true" ]; then
            echo "⚠️  WARNING: Session storage not configured"
            echo "    WhatsApp session will NOT persist across restarts"
            echo "    You'll need to re-scan QR code after each restart"
            echo ""
          fi
          echo "To scan QR code, visit:"
          echo "$URL/qr"
          echo "============================================"

      - name: Update Assistant with WhatsApp URL
        continue-on-error: true
        run: |
          # Update the main assistant service with the new WhatsApp URL
          WHATSAPP_URL="${{ steps.set-url.outputs.url }}"
          
          gcloud run services update wednesday-assistant \
            --region=${{ env.REGION }} \
            --update-env-vars="WAHA_URL=${WHATSAPP_URL}/api/sendText" \
            --quiet || echo "⚠️ Could not update assistant service"
