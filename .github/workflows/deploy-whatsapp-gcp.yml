# ============================================
# WhatsApp Service (Baileys) - GCP Deployment
# ============================================
# Deploys the Baileys WhatsApp gateway to Google Cloud Run.
# Forwards incoming messages to n8n (self-hosted on GCP VM)
# and exposes /api/sendText for n8n to send replies back.

name: Deploy WhatsApp Service to GCP

on:
  push:
    branches: [main, master]
    paths:
      - 'whatsapp-service/**'
      - '.github/workflows/deploy-whatsapp-gcp.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: wednesday-whatsapp
  ARTIFACT_REGISTRY: wednesday-registry
  IMAGE_NAME: whatsapp-service
  # n8n webhook on the GCP VM
  N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL || 'https://wednesday-ai.duckdns.org/webhook/whatsapp-webhook' }}

jobs:
  deploy-whatsapp:
    name: Deploy WhatsApp Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry (if not exists)
        continue-on-error: true
        run: |
          gcloud artifacts repositories create ${{ env.ARTIFACT_REGISTRY }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Wednesday WhatsApp Service images" \
            --quiet || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./whatsapp-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get own public URL for SELF_URL
        id: get-own-url
        run: |
          OWN_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)' 2>/dev/null || echo "")
          echo "own_url=$OWN_URL" >> $GITHUB_OUTPUT
          if [ -n "$OWN_URL" ]; then
            echo "✅ Existing service URL: $OWN_URL"
          else
            echo "ℹ️ First deploy — SELF_URL will be set after initial deployment"
          fi

      - name: Set up GCS session bucket
        id: setup-bucket
        run: |
          BUCKET_NAME="${{ env.PROJECT_ID }}-whatsapp-session"
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT

          if gcloud storage buckets describe gs://${BUCKET_NAME} >/dev/null 2>&1; then
            echo "✅ Bucket exists: gs://${BUCKET_NAME}"
            echo "bucket_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Creating bucket: gs://${BUCKET_NAME}"
            if gcloud storage buckets create gs://${BUCKET_NAME} \
              --location=${{ env.REGION }} \
              --uniform-bucket-level-access 2>&1; then
              echo "✅ Created bucket"
              echo "bucket_exists=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Could not create bucket — session won't persist across restarts"
              echo "bucket_exists=false" >> $GITHUB_OUTPUT
            fi
          fi

          # Grant access to Cloud Run SA
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)' 2>/dev/null || echo "")
          if [ -n "$PROJECT_NUMBER" ]; then
            CR_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
            gcloud storage buckets add-iam-policy-binding gs://${BUCKET_NAME} \
              --member="serviceAccount:${CR_SA}" \
              --role="roles/storage.objectAdmin" \
              --quiet 2>/dev/null || true
          fi

      - name: Deploy to Cloud Run (with persistent session)
        id: deploy
        if: steps.setup-bucket.outputs.bucket_exists == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            ENABLE_REAL_WHATSAPP=true
            SHOW_QR=true
            LOG_LEVEL=info
            WHATSAPP_HOOK_URL=${{ env.N8N_WEBHOOK_URL }}
            MAX_RECONNECT_ATTEMPTS=10
            SESSION_PATH=/app/session
            SELF_URL=${{ steps.get-own-url.outputs.own_url }}
          flags: |
            --platform=managed
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=1
            --max-instances=1
            --concurrency=100
            --timeout=3600
            --port=3000
            --execution-environment=gen2
            --add-volume=name=whatsapp-session,type=cloud-storage,bucket=${{ steps.setup-bucket.outputs.bucket_name }}
            --add-volume-mount=volume=whatsapp-session,mount-path=/app/session

      - name: Deploy to Cloud Run (without persistent session)
        id: deploy-no-storage
        if: steps.setup-bucket.outputs.bucket_exists != 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            ENABLE_REAL_WHATSAPP=true
            SHOW_QR=true
            LOG_LEVEL=info
            WHATSAPP_HOOK_URL=${{ env.N8N_WEBHOOK_URL }}
            MAX_RECONNECT_ATTEMPTS=10
            SELF_URL=${{ steps.get-own-url.outputs.own_url }}
          flags: |
            --platform=managed
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=1
            --max-instances=1
            --concurrency=100
            --timeout=3600
            --port=3000
            --execution-environment=gen2

      - name: Set deployment URL
        id: set-url
        run: |
          if [ -n "${{ steps.deploy.outputs.url }}" ]; then
            echo "url=${{ steps.deploy.outputs.url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ steps.deploy-no-storage.outputs.url }}" >> $GITHUB_OUTPUT
          fi

      - name: Update SELF_URL after first deploy
        if: steps.get-own-url.outputs.own_url == ''
        continue-on-error: true
        run: |
          # On very first deploy, SELF_URL was empty. Now update it.
          DEPLOYED_URL="${{ steps.set-url.outputs.url }}"
          if [ -n "$DEPLOYED_URL" ]; then
            gcloud run services update ${{ env.SERVICE_NAME }} \
              --region=${{ env.REGION }} \
              --update-env-vars="SELF_URL=${DEPLOYED_URL}" \
              --quiet
            echo "✅ Updated SELF_URL to $DEPLOYED_URL"
          fi

      - name: Deployment summary
        run: |
          URL="${{ steps.set-url.outputs.url }}"
          echo "============================================"
          echo "📱 WhatsApp Service Deployed!"
          echo "============================================"
          echo "  Service URL:  $URL"
          echo "  Webhook:      ${{ env.N8N_WEBHOOK_URL }}"
          echo "  Media URL:    $URL/api/media/<id>"
          echo "  QR code:      $URL/api/qr/image"
          echo ""
          if [ "${{ steps.setup-bucket.outputs.bucket_exists }}" != "true" ]; then
            echo "  ⚠️  Session storage not configured"
            echo "      QR code scan required after each restart"
            echo ""
          fi
          echo "  Architecture:"
          echo "    WhatsApp → Baileys (Cloud Run)"
          echo "        → n8n (${{ env.N8N_WEBHOOK_URL }})"
          echo "        → AI Agent + tools"
          echo "        → /api/sendText (reply)"
          echo "============================================"
