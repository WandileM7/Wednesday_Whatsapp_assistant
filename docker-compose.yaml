services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://wednesday:wednesday@db:5432/wednesday
      WAHA_URL: http://whatsapp-service:3000
    depends_on:
      - db
      - whatsapp-service
    restart: unless-stopped

  whatsapp-service:
    build: ./whatsapp-service
    ports:
      - "3000:3000"
    environment:
      WHATSAPP_HOOK_URL: http://backend:8000/whatsapp/webhook
      ENABLE_REAL_WHATSAPP: "true"
      SESSION_PATH: /app/auth_info_baileys
    volumes:
      - whatsapp-auth:/app/auth_info_baileys
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wednesday}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wednesday}
      POSTGRES_DB: ${POSTGRES_DB:-wednesday}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  whatsapp-auth:
  pgdata:
