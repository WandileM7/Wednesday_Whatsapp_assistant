# Wednesday WhatsApp Assistant - Secrets
# =====================================
# IMPORTANT: This is a TEMPLATE file!
# Replace placeholders with base64-encoded values before applying.
#
# Encode a value: echo -n "your-value" | base64
# Or use Rancher Secrets UI to create these secrets
#
# For production, consider using:
# - External Secrets Operator
# - HashiCorp Vault
# - Rancher Secrets Management

apiVersion: v1
kind: Secret
metadata:
  name: wednesday-secrets
  namespace: wednesday
  labels:
    app.kubernetes.io/name: wednesday-assistant
type: Opaque
stringData:
  # AI API Keys
  BYTEZ_API_KEY: "your-bytez-api-key"
  GEMINI_API_KEY: "your-gemini-api-key"  # Optional fallback
  
  # Spotify Integration
  SPOTIFY_CLIENT_ID: "your-spotify-client-id"
  SPOTIFY_SECRET: "your-spotify-secret"
  SPOTIFY_REDIRECT_URI: "https://your-domain.com/callback"
  SPOTIFY_REFRESH_TOKEN: "your-refresh-token"  # After OAuth flow
  
  # Google Services
  GOOGLE_CLIENT_ID: "your-google-client-id"
  GOOGLE_CLIENT_SECRET: "your-google-client-secret"
  GOOGLE_REFRESH_TOKEN: "your-google-refresh-token"  # After OAuth flow
  
  # Flask Session Secret
  FLASK_SECRET_KEY: "your-random-secret-key-minimum-32-chars"
  
  # Assistant Personality
  PERSONALITY_PROMPT: "You are Wednesday, a helpful AI assistant with a direct and efficient personality."

---
# Google Service Account (if using service account auth)
# Create from: https://console.cloud.google.com/iam-admin/serviceaccounts
apiVersion: v1
kind: Secret
metadata:
  name: google-service-account
  namespace: wednesday
  labels:
    app.kubernetes.io/name: wednesday-assistant
type: Opaque
data:
  # Base64 encoded JSON key file
  # cat service-account.json | base64
  credentials.json: ""

---
# Firebase Credentials (optional)
apiVersion: v1
kind: Secret
metadata:
  name: firebase-credentials
  namespace: wednesday
  labels:
    app.kubernetes.io/name: wednesday-assistant
type: Opaque
data:
  # Base64 encoded Firebase service account JSON
  firebase_credentials.json: ""
