# Wednesday Flask Assistant Deployment
# =====================================
# Main Flask application handling WhatsApp webhooks
# and providing the web interface.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant
  namespace: wednesday
  labels:
    app.kubernetes.io/name: wednesday-assistant
    app.kubernetes.io/component: assistant
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: assistant
  template:
    metadata:
      labels:
        app: assistant
        app.kubernetes.io/name: wednesday-assistant
        app.kubernetes.io/component: assistant
    spec:
      containers:
        - name: assistant
          image: wednesday-assistant:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "main.py"]
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: wednesday-config
            - secretRef:
                name: wednesday-secrets
          env:
            - name: PORT
              value: "5000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: session-data
              mountPath: /app/session
            - name: task-data
              mountPath: /app/task_data
            - name: flask-session
              mountPath: /app/flask_session
            - name: database
              mountPath: /app/data
      volumes:
        - name: session-data
          persistentVolumeClaim:
            claimName: wednesday-session-pvc
        - name: task-data
          persistentVolumeClaim:
            claimName: wednesday-task-pvc
        - name: flask-session
          emptyDir: {}
        - name: database
          persistentVolumeClaim:
            claimName: wednesday-db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: assistant
  namespace: wednesday
  labels:
    app.kubernetes.io/name: wednesday-assistant
    app.kubernetes.io/component: assistant
spec:
  selector:
    app: assistant
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  type: ClusterIP
