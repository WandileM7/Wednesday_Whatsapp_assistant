# Kustomization for Wednesday MCP Server
# =======================================
# Use with: kubectl apply -k kubernetes/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wednesday

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: wednesday-assistant
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/managed-by: kustomize

# Resources to include
resources:
  - configmap.yaml
  - secrets.yaml
  - pvc.yaml
  - mcp-server-deployment.yaml
  - assistant-deployment.yaml
  - whatsapp-deployment.yaml
  - ingress.yaml
  - hpa.yaml

# ConfigMap generator for dynamic config
configMapGenerator:
  - name: wednesday-runtime-config
    literals:
      - DEPLOY_TIME=${DEPLOY_TIME:-unknown}

# Images to use (override in overlays)
images:
  - name: wednesday-assistant
    newName: your-registry/wednesday-assistant
    newTag: latest
  - name: wednesday-whatsapp
    newName: your-registry/wednesday-whatsapp
    newTag: latest
  - name: wednesday-mcp
    newName: your-registry/wednesday-mcp
    newTag: latest

# Patches for environment-specific config
# Uncomment and modify for your environment
# patches:
#   - path: patches/production-replicas.yaml
#     target:
#       kind: Deployment
#       name: assistant
