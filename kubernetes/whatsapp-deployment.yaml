# WhatsApp Service (Baileys) Deployment
# ======================================
# WhatsApp gateway service using Baileys library.
# Handles WebSocket connection to WhatsApp and message forwarding.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-service
  namespace: wednesday
  labels:
    app.kubernetes.io/name: wednesday-assistant
    app.kubernetes.io/component: whatsapp
spec:
  replicas: 1  # Must be 1 - only one WhatsApp session per number
  strategy:
    type: Recreate  # Ensure clean session handoff
  selector:
    matchLabels:
      app: whatsapp-service
  template:
    metadata:
      labels:
        app: whatsapp-service
        app.kubernetes.io/name: wednesday-assistant
        app.kubernetes.io/component: whatsapp
    spec:
      containers:
        - name: whatsapp
          image: wednesday-whatsapp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: wednesday-config
          env:
            - name: ENABLE_REAL_WHATSAPP
              value: "true"
            - name: WHATSAPP_HOOK_URL
              value: "http://assistant:5000/webhook"
            - name: WHATSAPP_HOOK_EVENTS
              value: "message"
            - name: SESSION_PATH
              value: "/app/session"
            - name: SHOW_QR
              value: "true"
            - name: MAX_RECONNECT_ATTEMPTS
              value: "10"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=256"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "300Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: whatsapp-session
              mountPath: /app/session
      volumes:
        - name: whatsapp-session
          persistentVolumeClaim:
            claimName: whatsapp-session-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: whatsapp-service
  namespace: wednesday
  labels:
    app.kubernetes.io/name: wednesday-assistant
    app.kubernetes.io/component: whatsapp
spec:
  selector:
    app: whatsapp-service
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
