# Horizontal Pod Autoscaler for Wednesday Assistant
# ==================================================
# Automatically scales the assistant based on CPU/memory usage.
# Note: WhatsApp service should NOT be scaled (single session).

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: assistant-hpa
  namespace: wednesday
  labels:
    app.kubernetes.io/name: wednesday-assistant
    app.kubernetes.io/component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: assistant
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

---
# HPA for MCP Server (can scale based on load)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mcp-server-hpa
  namespace: wednesday
  labels:
    app.kubernetes.io/name: wednesday-assistant
    app.kubernetes.io/component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mcp-server
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300

---
# Pod Disruption Budgets for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: assistant-pdb
  namespace: wednesday
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: assistant

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: whatsapp-pdb
  namespace: wednesday
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: whatsapp-service
